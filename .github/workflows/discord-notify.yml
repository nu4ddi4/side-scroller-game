name: Discord Notify
on:
  push:
  pull_request:
    types: [opened, reopened, closed, merged]
  issues:
    types: [opened, reopened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send Discord webhook
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTION: ${{ github.event.action }}
          TITLE: ${{ github.event.pull_request.title }}
          PR_NUM: ${{ github.event.pull_request.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
          COMPARE: ${{ github.event.compare }}
        run: |
          set -e
          if [ -z "$WEBHOOK" ] || [ "$WEBHOOK" = "null" ]; then
            echo "No webhook configured."
            exit 0
          fi

          COUNT=$(echo "$COMMITS_JSON" | jq -r 'length' 2>/dev/null || echo 0)
          MSGS=""
          if [ "$COUNT" -gt 0 ]; then
            for i in $(seq 0 $((COUNT-1))); do
              MSGS="${MSGS}- $(echo "$COMMITS_JSON" | jq -r ".[$i].message" 2>/dev/null | head -n1)\n"
            done
          fi

          CONTENT="[${REPO}] ${EVENT} on ${REF} by ${ACTOR}"
          [ -n "$PR_NUM" ] && CONTENT="${CONTENT} PR #${PR_NUM}"
          [ -n "$ISSUE_NUM" ] && CONTENT="${CONTENT} Issue #${ISSUE_NUM}"

          PAYLOAD=$(jq -n \
            --arg content "$CONTENT" \
            --arg desc "$MSGS" \
            '{ content: $content, embeds: [ { description: $desc } ] }'
          )

          curl -s -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"
