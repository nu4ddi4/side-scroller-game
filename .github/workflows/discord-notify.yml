name: Discord Notify
on:
  push:
  pull_request:
    types: [opened, reopened, closed, merged]
  issues:
    types: [opened, reopened, closed]
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send minimal Discord webhook
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTION: ${{ github.event.action }}
          PR_NUM: ${{ github.event.pull_request.number }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          TITLE: ${{ github.event.pull_request.title }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
        run: |
          set -e
          if [ -z "$WEBHOOK" ] || [ "$WEBHOOK" = "null" ]; then
            echo No webhook
            exit 0
          fi
          COUNT=$(echo "$COMMITS_JSON" | jq -r length 2>/dev/null || echo 0)
          MSGS=""
          if [ "$COUNT" -gt 0 ]; then
            for i in $(seq 0 $((COUNT-1))); do
              MSGS="${MSGS}- $(echo "$COMMITS_JSON" | jq -r ".[$i].message" 2>/dev/null || true)\n"
            done
          fi
          case "$EVENT" in
            push) CONTENT="[$REPO] push $REF by $ACTOR" ;;
            pull_request) CONTENT="[$REPO] PR #$PR_NUM $ACTION by $ACTOR" ;;
            issues) CONTENT="[$REPO] issue #$ISSUE_NUM $ACTION by $ACTOR" ;;
            *) CONTENT="[$REPO] $EVENT" ;;
          esac
          PAYLOAD=$(jq -n --arg content "$CONTENT" --arg desc "$MSGS" '{content:$content,embeds:[{description:$desc}]}')
          curl -s -X POST "$WEBHOOK" -H 'Content-Type: application/json' -d "$PAYLOAD"
